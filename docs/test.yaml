Do przetestowania:
  - FunctionDef:
      - utworzenie kontekstu wywołania
      - zebranie parametrów z acc (ewentualnie err jak za mało)
      - sprawdzenie poprawności sygnatury
      - deklaracja parametrów wywołania jako zmiennych lokalnych
      - wykonanie wszystkich statementów
        - lub return wcześniej
      - porównanie zwracanego typu z wartością zwracaną
      - wrzucenie do acc wartości zwróconej

  - VarOrConstDecl:
      - ewaluacja wyrażenia inicjalizującego (void -> err)
      - porównanie typu zmiennej inicjalizowanej i wyrażenia inicjalizująego
      - dodanie zmiennej do zmiennych danego kontekstu
        - przykrycie, jeżeli w danym scopie nie ma innej o takiej samej nazwie
        - err, jeśli duplikat
      - wrzucenie do acc Void

  - IfStatement:
      - ewaluacja warunku (+ sprawdzenie czy typu bool)
      - wchodzenie w gałęzie (ekskluzywnie 1 gałąź max.)
      - else w przypadku nie spełnienia żadnego warunku
      - dodanie i usunięcie kontekstu
      - wrzucenie do acc Void

  - WhileStatement:
      - ewaluacja warunku (za każdym razem) (+ sprawdzenie czy typu bool)
      - przejście przez ciało (dodawanie i zrzucanie kontekstu za każdym razem)
      - break/continue
      - wrzucenie do acc Void

  - ControlFlow:
      - sprawdzenie czy w pętli (err jeżeli nie), ale tylko do scope funkcji max.
      - zmiana stanu interpretera (ControlFlow)
      - wrrzucenie do acc Void

  - Return:
      - sprawdzenie czy w ciele funkcji (err jeśli nie)
      - ewaluacja wyrażenia
      - zmiana stanu na return
      - wrzucenie wartości zwracanej do acc (nawet void)

  - Assignment:
      - ewaluacja lewego operandu
      - ewaluacja prawego operandu
      - sprawdzenie kompatybilności typów operandów
      - sprawdzenie czy lewy operand to LValue lub referencja
      - obliczenie nowej wartości z poprawką na operator
      - przypisanie nowej wartości
      - wrzucenie do acc Void

  - BinaryExpr:
      - ewaluacja lewego operandu
      - ewaluacja prawego operandu
      - sprawdzenie kompatybilności typów operandów
      - wykonanie operacji
        i wrzucenie wyniku do acc

  - UnaryExpr:
      - ewaluacja operandu
      - wykonanie operacji
        i wrzucenie wyniku do acc

  - CastExpr:
      - ewaluacja operandu
      - cast
      - wrzucenie do acc

  - ArrayIdentifierOp:
      - ewaluacja operandu (err jeżeli nie typu arr)
      - mock argumentów wywołania
      - wyszukanie funkcji o danej sygnaturze
      - wykonanie operacji:
          - filter - nowa wartość to przycięty arr z wartościami, dla których `bool foo(T)` zwróciło true
          - map - nowa wartość to arr o tej samej długości z wartościami które zwróciła T2 foo(T2) dla każdego elementu
      - wrzucenie wyniku do acc

  - FunctionCall:
      - ewaluacja parametrów wywołania
      - znalezienie funkcji o pasującej sygnaturze
      - wykonanie funkcji
        (wywołanie zostawia wartość w acc)

  - ArrayLiteral:
      - ewaluacja pierwszego elementu i na jego podstawie dedukcja typu
      - ewaluacja reszty elementów i sprawdzenie homogeniczności array'u
      - wrzucenie gotowego arr do acc jako 1 obiekt

  - Literal:
      - wrzucenie wartości do acc

  - PrimaryIdentifier:
      - zbadanie czy identyfikator odwołuje się do istniejącej zmiennej
      - wrzucenie referencji do zmiennej do acc

  - Program:
      - auto dodanie wbudowanych funkcji
      - zbieranie funkcji użytkownika na początku


